on:
  push:
    branches: [main]
  pull_request:

name: CI

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install rust-toolchain
        run: rustup component add rustfmt clippy

      - name: cargo fetch --locked
        run: cargo fetch --locked

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check kernels
        run: cargo check -p collatz -p mandelbrot

      - name: cargo check runner
        run: cargo check -p runner
